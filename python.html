<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Engineer Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0a0f;color:#e2e8f0;}
  .phase-card{cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:1px solid #1e1e2e;}
  .phase-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .topic-row{border-bottom:1px solid #1e1e2e;padding:10px 0;display:flex;gap:12px;align-items:flex-start;}
  .topic-row:last-child{border-bottom:none;}
  .close-btn:hover{opacity:0.7;}
  .resource-tag{display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;margin:4px;background:#1e1e2e;border:1px solid #2e2e4e;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .detail-panel{animation:fadeIn 0.3s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const phases = [
  {
    id:1, title:"Python Foundations", emoji:"🐍", duration:"4–6 weeks",
    color:"#22d3ee", accent:"#0e7490",
    note:"You know SQL — Python will feel familiar fast.",
    topics:[
      {name:"Syntax & Data Types",detail:"Variables, strings, numbers, booleans, None"},
      {name:"Control Flow",detail:"if/elif/else, for/while loops, list comprehensions"},
      {name:"Functions & Scope",detail:"def, args, kwargs, lambda, built-ins"},
      {name:"Data Structures",detail:"Lists, dicts, sets, tuples — your daily tools"},
      {name:"File I/O",detail:"Read/write CSV, JSON, text files"},
      {name:"OOP Basics",detail:"Classes, methods, __init__ — enough to use libraries"},
      {name:"Error Handling",detail:"try/except/finally, raising exceptions"},
      {name:"Virtual Environments",detail:"venv, pip, requirements.txt"},
    ],
    resources:["Python.org docs","Automate the Boring Stuff (free)","LeetCode Easy problems"],
  },
  {
    id:2, title:"Data Manipulation", emoji:"🔢", duration:"4–5 weeks",
    color:"#a78bfa", accent:"#6d28d9",
    note:"This is where your SQL knowledge gives you a huge head start.",
    topics:[
      {name:"Pandas",detail:"DataFrames, Series, groupby, merge, pivot — like SQL in Python"},
      {name:"NumPy",detail:"Arrays, vectorized ops, broadcasting — fast math"},
      {name:"Data Cleaning",detail:"Nulls, duplicates, type casting, string ops"},
      {name:"Working with CSV/JSON/Parquet",detail:"Read/write all major flat file formats"},
      {name:"Database Connections",detail:"SQLAlchemy, psycopg2 — run SQL from Python"},
      {name:"Basic Visualization",detail:"Matplotlib, Seaborn — spot issues in your data"},
    ],
    resources:["Pandas docs","Kaggle free courses","Real Python tutorials"],
  },
  {
    id:3, title:"SQL & Databases (Advanced)", emoji:"🗄️", duration:"3–4 weeks",
    color:"#34d399", accent:"#065f46",
    note:"Build on what you know — go deeper with performance & design.",
    topics:[
      {name:"Advanced SQL",detail:"Window functions, CTEs, recursive queries, EXPLAIN"},
      {name:"Data Modeling",detail:"Star schema, snowflake schema, normalization vs. denormalization"},
      {name:"PostgreSQL",detail:"Indexing, partitioning, JSONB, query optimization"},
      {name:"NoSQL Basics",detail:"MongoDB, Redis — when to use non-relational stores"},
      {name:"OLAP vs OLTP",detail:"The core distinction in data engineering design"},
    ],
    resources:["Mode SQL Tutorial","Use the Index, Luke (free book)","PostgreSQL docs"],
  },
  {
    id:4, title:"Data Engineering Core", emoji:"⚙️", duration:"6–8 weeks",
    color:"#fb923c", accent:"#9a3412",
    note:"The heart of the role — pipelines, warehouses, orchestration.",
    topics:[
      {name:"ETL vs ELT",detail:"Understand the difference and when to use each"},
      {name:"Apache Airflow",detail:"DAGs, operators, scheduling, sensors — industry standard"},
      {name:"dbt (data build tool)",detail:"Transform data in your warehouse with SQL + version control"},
      {name:"Data Warehouses",detail:"Snowflake, BigQuery, or Redshift — pick one to learn deeply"},
      {name:"Data Lakes",detail:"S3 / GCS, Parquet, Delta Lake, Iceberg formats"},
      {name:"Batch vs Streaming",detail:"Know the tradeoffs before choosing tools"},
      {name:"Apache Spark",detail:"PySpark for large-scale distributed processing"},
      {name:"Kafka Basics",detail:"Producers, consumers, topics — real-time data pipelines"},
    ],
    resources:["Airflow docs","dbt Learn (free)","Fundamentals of Data Engineering (book)"],
  },
  {
    id:5, title:"Cloud & Infrastructure", emoji:"☁️", duration:"4–5 weeks",
    color:"#f472b6", accent:"#9d174d",
    note:"Pick ONE cloud provider and go deep — AWS is most common.",
    topics:[
      {name:"AWS / GCP / Azure",detail:"S3, Glue, Redshift (AWS) or BigQuery, Dataflow (GCP)"},
      {name:"Docker",detail:"Containers for reproducible environments — essential skill"},
      {name:"Linux & Bash",detail:"File system, cron jobs, shell scripting basics"},
      {name:"Terraform (basics)",detail:"Infrastructure as Code — provision resources reliably"},
      {name:"IAM & Security",detail:"Roles, permissions, least privilege principle"},
    ],
    resources:["AWS Free Tier","Docker Getting Started","A Cloud Guru / Udemy"],
  },
  {
    id:6, title:"Engineering Best Practices", emoji:"🏗️", duration:"Ongoing",
    color:"#fbbf24", accent:"#92400e",
    note:"What separates junior from senior data engineers.",
    topics:[
      {name:"Git & Version Control",detail:"Branching, PRs, rebasing — work like a software engineer"},
      {name:"Testing",detail:"pytest, dbt tests, data quality checks with Great Expectations"},
      {name:"CI/CD",detail:"GitHub Actions, automated testing and deployment"},
      {name:"Monitoring & Alerting",detail:"Data freshness, row count checks, anomaly detection"},
      {name:"Documentation",detail:"README, data dictionaries, lineage graphs"},
      {name:"Performance Tuning",detail:"Query optimization, partitioning, caching strategies"},
    ],
    resources:["GitHub Docs","Great Expectations docs","Data Engineering Podcast"],
  },
];

function Roadmap() {
  const [active, setActive] = useState(null);
  const phase = active !== null ? phases[active] : null;

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",fontFamily:"'Courier New',monospace",color:"#e2e8f0",padding:"40px 24px"}}>
      <div style={{maxWidth:860,margin:"0 auto 48px"}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#4ade80",letterSpacing:4,marginBottom:12}}>
          {'>'} DATA_ENGINEER_PATH.exe
        </div>
        <h1 style={{fontFamily:"'Space Mono',monospace",fontSize:"clamp(28px,5vw,48px)",fontWeight:700,lineHeight:1.1,margin:"0 0 16px",background:"linear-gradient(135deg,#e2e8f0 0%,#94a3b8 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          Data Engineer<br/>Roadmap
        </h1>
        <p style={{fontFamily:"'DM Sans',sans-serif",color:"#64748b",fontSize:15,margin:0}}>
          SQL background → Job-ready data engineer · ~9–12 months · Click any phase to explore
        </p>
      </div>

      <div style={{maxWidth:860,margin:"0 auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16,marginBottom:32}}>
          {phases.map((p,i) => (
            <div key={p.id} className="phase-card" onClick={() => setActive(active===i?null:i)}
              style={{background:active===i?"#12121e":"#0d0d18",borderRadius:12,padding:"20px 22px",borderColor:active===i?p.color:"#1e1e2e",borderWidth:active===i?1.5:1,borderStyle:"solid"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <span style={{fontSize:28}}>{p.emoji}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,padding:"3px 8px",borderRadius:4,background:p.accent+"33",color:p.color,border:`1px solid ${p.color}44`}}>
                  {p.duration}
                </span>
              </div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#475569",marginBottom:6}}>PHASE {p.id}</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:17,color:active===i?p.color:"#cbd5e1",marginBottom:8}}>{p.title}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {p.topics.slice(0,3).map(t => (
                  <span key={t.name} style={{fontSize:11,fontFamily:"'DM Sans',sans-serif",color:"#475569",background:"#111827",padding:"2px 7px",borderRadius:3,border:"1px solid #1e2433"}}>
                    {t.name}
                  </span>
                ))}
                {p.topics.length>3 && <span style={{fontSize:11,color:"#334155",fontFamily:"'DM Sans',sans-serif"}}>+{p.topics.length-3} more</span>}
              </div>
            </div>
          ))}
        </div>

        {phase && (
          <div className="detail-panel" style={{background:"#0d0d18",border:`1.5px solid ${phase.color}55`,borderRadius:16,padding:"28px 32px",marginBottom:32}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:phase.color,marginBottom:8,letterSpacing:2}}>PHASE {phase.id} · {phase.duration}</div>
                <h2 style={{fontFamily:"'Space Mono',monospace",fontSize:24,margin:0,color:"#e2e8f0"}}>{phase.emoji} {phase.title}</h2>
              </div>
              <button className="close-btn" onClick={() => setActive(null)}
                style={{background:"none",border:"none",color:"#475569",fontSize:20,cursor:"pointer",padding:4}}>✕</button>
            </div>
            <div style={{background:phase.accent+"22",border:`1px solid ${phase.color}33`,borderRadius:8,padding:"10px 14px",marginBottom:20,fontFamily:"'DM Sans',sans-serif",fontSize:14,color:phase.color}}>
              💡 {phase.note}
            </div>
            <div style={{marginBottom:20}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#475569",marginBottom:12,letterSpacing:2}}>TOPICS TO MASTER</div>
              {phase.topics.map((t,i) => (
                <div key={i} className="topic-row">
                  <div style={{width:22,height:22,borderRadius:4,background:phase.accent+"44",border:`1px solid ${phase.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:phase.color,fontFamily:"'Space Mono',monospace",flexShrink:0}}>
                    {String(i+1).padStart(2,"0")}
                  </div>
                  <div>
                    <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:14,color:"#cbd5e1",marginBottom:2}}>{t.name}</div>
                    <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#475569"}}>{t.detail}</div>
                  </div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#475569",marginBottom:10,letterSpacing:2}}>WHERE TO LEARN</div>
              <div>{phase.resources.map((r,i) => (
                <span key={i} className="resource-tag" style={{fontFamily:"'DM Sans',sans-serif",color:"#94a3b8"}}>{r}</span>
              ))}</div>
            </div>
          </div>
        )}

        <div style={{background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:12,padding:"20px 24px",marginBottom:32}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#475569",marginBottom:16,letterSpacing:2}}>TOTAL TIMELINE</div>
          <div style={{display:"flex",gap:3,height:10,borderRadius:6,overflow:"hidden",marginBottom:12}}>
            {phases.map((p,i) => (
              <div key={i} style={{flex:[5,4,3,7,4,3][i],background:active===i?p.color:p.color+"66",transition:"background 0.2s",cursor:"pointer"}}
                onClick={() => setActive(active===i?null:i)}/>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#475569"}}>Month 1</span>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#4ade80",fontWeight:600}}>~12 months to job-ready</span>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#475569"}}>Month 12</span>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12,paddingBottom:40}}>
          {[
            {icon:"🎯",title:"Build projects",tip:"End each phase with a real project — ETL pipeline, Airflow DAG, dbt model"},
            {icon:"💼",title:"Portfolio first",tip:"GitHub repo with clean, documented pipelines matters more than certs"},
            {icon:"🔗",title:"Your SQL edge",tip:"Many Python devs are weak in SQL — yours is already a differentiator"},
            {icon:"📚",title:"Best book",tip:"\"Fundamentals of Data Engineering\" by Reis & Housley — read it early"},
          ].map((tip,i) => (
            <div key={i} style={{background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:10,padding:"14px 16px"}}>
              <div style={{fontSize:20,marginBottom:6}}>{tip.icon}</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:13,color:"#cbd5e1",marginBottom:4}}>{tip.title}</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#475569",lineHeight:1.5}}>{tip.tip}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Roadmap/>);
</script>
</body>
</html>
